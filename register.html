<!DOCTYPE html>
<html>
    <head>
        <title>Budget Tracker - Register</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/register.css">
        <script src="scripts/register.js"></script>
        <script src="scripts/auth.js"></script>
    </head>
    <body>
        <div class="register-page">
            <div class="register-card">
                <div class="register-logo">
                    <span>Budget Tracker</span>
                </div>
                <h2>Welcome</h2>
                <p class="register-subtitle">Create Your Account</p>

                <form id="register-form">
                    <div id="error-msg" class="error-message" style="display: none;"></div>
                    <div class="register-field">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                    </div>
                    <div class="register-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    </div>
                    <div class="register-field">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your name" autocomplete="John Doe">
                    </div>
                    <div class="register-field">
                        <label for="currency">Currency</label>
                            <select id="setting-currency">
                                <option value="RON">RON</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                    </div>
                    <button type="submit" class="register-btn">Register</button>
                </form>
            </div>
        </div>
    </body>
</html>
