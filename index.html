<!DOCTYPE html>
<html>
    <head>
        <title>Budget Tracker</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="scripts/data.js"></script>
        <script src="scripts/auth.js"></script>
        <script src="scripts/nav.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="scripts/dashboard.js" defer></script>
    </head>
    <body>
        <div class="nav-bar">
            <div class="title">
                <span>Budget Tracker</span>
            </div>
            <div class="nav-bar-item">
                <span><a href="index.html">Dashboard</a></span>
            </div>
            <div class="nav-bar-item">
                <span><a href="receipts.html">Receipts</a></span>
            </div>
            <div class="nav-bar-item">
                <span><a href="add-receipt.html">Add Receipt</a></span>
            </div>
            <div class="nav-bar-item">
                <span><a href="categories.html">Categories</a></span>
            </div>
            <div class="nav-bar-right">
                <a href="profile.html" class="nav-user" id="nav-user"></a>
                <div class="nav-bar-notifications">
                    <img src="assets/icons/notifications.svg">
                </div>
            </div>
        </div>
        <div class="dashboard-header">
            <h2>Dashboard Overview</h2>
            <div class="period-select">
                <label>Period:</label>
                <input type="month" id="period">
            </div>
        </div>
        <div class="stat-cards">
            <div class="card">
                <div class="card-icon purple">
                    <img src="assets/icons/money.svg">
                </div>
                <div class="card-text">
                    <h4>Total Spent</h4>
                    <p id="total-spent">—</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon green">
                    <img src="assets/icons/categories.svg">
                </div>
                <div class="card-text">
                    <h4>Top Category</h4>
                    <p id="top-category">—</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon yellow">
                    <img src="assets/icons/document.svg">
                </div>
                <div class="card-text">
                    <h4>Number of Receipts</h4>
                    <p id="num-receipts">—</p>
                </div>
            </div>
        </div>
        <div class="charts">
            <div class="chart-card">
                <h3>Spending by Category</h3>
                <canvas id="bar-chart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Categorical Breakdown</h3>
                <canvas id="pie-chart"></canvas>
            </div>
        </div>
    </body>
</html>
